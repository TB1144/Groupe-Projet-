<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Connectez-vous à Web4All pour accéder à votre espace étudiant, pilote ou administrateur.">
    <meta name="keywords" content="connexion, login, Web4All, CESI, espace étudiant">
    <title>Connexion — Web4All</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <h2>Web4<span class="highlight">All</span>.</h2>
        </div>

        <nav class="nav-links">
            <ul>
                <li><a href="/">Accueil</a></li>
                <li><a href="offres/index.php">Offres</a></li>
                <li><a href="entreprises.html">Entreprises</a></li>
                <li><a href="statistiques.html">Statistiques</a></li>
                <li><a href="contacter.html">Contact</a></li>
            </ul>
        </nav>

        <div class="nav-actions">
            <a href="login.html" class="btn-primary">Connexion</a>
        </div>

        <div class="burger-menu" id="burger-menu">
            <span class="line"></span>
            <span class="line"></span>
            <span class="line"></span>
        </div>
    </header>

    <main class="login-page">
        <section class="login-container">
            <div class="login-box">
                <h2>Bon retour parmi nous.</h2>
                <p>Connectez-vous pour accéder à vos offres de stage.</p>

                <form action="#" method="POST">
                    <div class="input-group">
                        <label for="email">Adresse E-mail</label>
                        <input type="email" id="email" placeholder="prenom.nom@viacesi.fr" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Mot de passe</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-submit">Se connecter</button>
                </form>

                <div class="login-links">
                    <a href="#">Mot de passe oublié ?</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p>&copy; 2026 Web4All — Tous droits réservés.</p>
            <div class="footer-links">
                <a href="mentions-legales.html">Mentions légales</a>
                <a href="contacter.html">Contact</a>
            </div>
        </div>
    </footer>

    <script>
        const burgerMenu = document.getElementById('burger-menu');
        const navLinks = document.querySelector('.nav-links');
        burgerMenu.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
    </script>
</body>
</html>
